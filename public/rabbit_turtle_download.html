<p>아래 버튼을 누르면 브라우저에서 플러그인 가져오기용 ZIP 파일을 생성합니다.</p>

<script>
const ROOT='vault/시나리오/RACE001_토끼와_거북이/';
const files={};
function add(path, content){files[path]=content.trimStart();}
function y(type,title,extra=''){return `---\n종류: ${type}\n제목: ${title}\n시나리오ID: RACE001\n상태: 활성\n${extra}---\n\n`;}
add('README_가져오기.md',`# 토끼와 거북이 NewTRPG 시나리오\n\n이 ZIP은 NewTRPG 세계형 시나리오 구조로 제작되었습니다.\n\n가져오기 기준 경로:\n- vault/시나리오/RACE001_토끼와_거북이/\n\n목표:\n- 거북이 팀의 팀원인 플레이어들이 자동차를 만들고 레이스에서 거북이가 토끼 팀을 이기도록 돕는다.\n`);
add(ROOT+'00_시나리오_메인.md',y('시나리오','토끼와 거북이',`목표: 거북이의 레이싱 승리 지원\n플레이어역할: 거북이 팀 팀원\n최대플레이어수: 4\n현재세계상태: "[[01_세계상태]]"\nGM대시보드: "[[02_GM_대시보드]]"\n`)+`# 토끼와 거북이\n\n플레이어는 [[거북이]]의 레이싱 팀원이다. 첫날에는 [[자동차_제작장]]에서 팀 전용 자동차를 만든다. 이후 [[출발선]], [[당근밭_직선로]], [[흔들다리]], [[진흙늪_코너]], [[언덕_가속로]], [[해변_모래길]], [[마지막_결승선]]을 자유롭게 돌파하며 토끼 팀의 방해를 처리한다.\n\n## 핵심 운영 원칙\n- 정해진 사건 순서가 아니라 장소, 통로, NPC, 아이템, 단서, 이벤트, 세계상태로 운영한다.\n- 자동차 제작은 설계도, 외골격, 엔진, 완성 단계가 있으나 각 칸은 플레이어 재료와 선택에 따라 기록한다.\n- 레이스 중 방해를 받거나, 반대로 토끼 팀을 방해할 수 있다.\n- 필수 결론인 '거북이의 승리 조건'은 [[단서_승리조건_안정성]], [[단서_승리조건_연료효율]], [[단서_승리조건_토끼습성]] 중 3개 이상으로 도달 가능하다.\n\n## 주요 링크\n- [[자동차_제작_기록지]]\n- [[레이스_구간_진행규칙]]\n- [[토끼팀_방해_다이스표]]\n- [[거북이팀]] / [[토끼팀]]\n`);
add(ROOT+'01_세계상태.md',y('세계상태','토끼와 거북이 세계상태')+`# 세계상태\n\n현재일차: 1\n현재단계: 자동차 제작\n경보수준: 0\n레이스상태: 준비\n거북이상태: 생존\n토끼상태: 생존\n\n## 자동차 제작 상태\n설계도: 비어 있음\n외골격: 비어 있음\n엔진: 비어 있음\n완성도: 0/4\n팀재료목록: []\n고유재료기록: []\n차량특성: []\n차량약점: []\n\n## 레이스 상태\n현재구간: [[출발선]]\n거북이팀진행도: 0\n토끼팀진행도: 0\n차량내구도: 10\n차량속도: 1\n차량제어: 1\n차량연료: 10\n토끼팀방해대기: 없음\n\n## NPC 상태 추적\n사망NPC: []\n납치NPC: []\n실종NPC: []\n도주NPC: []\n\nNPC가 사망, 납치, 실종, 소멸 상태가 되면 기존 장소에서 등장하지 않는다.\n`);
add(ROOT+'02_GM_대시보드.md',y('GM_대시보드','토끼와 거북이 GM 대시보드')+`# GM 대시보드\n\n## 즉시 확인\n- 제작 기록: [[자동차_제작_기록지]]\n- 레이스 규칙: [[레이스_구간_진행규칙]]\n- 토끼 방해: [[토끼팀_방해_다이스표]]\n- 세계상태: [[01_세계상태]]\n\n## 권장 진행\n1. 플레이어가 자동차 제작 4단계를 채운다.\n2. 각 단계는 재료, 방식, 담당자, 판정, 결과를 자유롭게 기록한다.\n3. 레이스 시작 후 구간마다 통로 조건과 방해 다이스를 확인한다.\n4. 플레이어가 토끼팀을 역방해하면 [[토끼팀]] 평판과 경보가 변한다.\n\n## 승리 판정\n거북이팀이 결승선에 먼저 도착하거나, 토끼팀이 3회 이상 지연되고 거북이 차량이 완주 가능하면 승리한다.\n`);
add(ROOT+'세부장소/자동차_제작장.md',y('세부장소','자동차 제작장',`상위장소: "[[레이스_마을]]"\n연결통로: ["[[통로_제작장_출발선]]"]\n`)+`# 자동차 제작장\n\n자동차를 만드는 공방이다. 설계도, 외골격, 엔진, 완성 단계의 작업대가 있다.\n\n## 상호작용\n- [[자동차_제작_기록지]] 작성\n- [[아이템_낡은_스프링]], [[아이템_당근연료]], [[아이템_거북등껍질_판금]] 조사\n- 토끼팀 정찰 여부 확인\n`);
add(ROOT+'장소/레이스_마을.md',y('장소','레이스 마을',`연결통로: ["[[통로_제작장_출발선]]"]\n`)+`# 레이스 마을\n\n레이스 참가자들이 준비하는 마을이다. 자동차 제작장과 출발선이 있다.\n`);
['출발선','당근밭_직선로','흔들다리','진흙늪_코너','언덕_가속로','해변_모래길','마지막_결승선'].forEach((name,i)=>add(ROOT+'장소/'+name+'.md',y('장소',name,`레이스순번: ${i}\n`)+`# ${name}\n\n레이스 구간이다. 통로 조건, 방해물, 토끼팀 개입 여부를 확인한다.\n\n## 구간 요소\n- 구간 위험도: ${i+1}\n- 기본 통과: 차량 제어 또는 속도 판정\n- 대체 통과: 아이템 사용, 팀 협동, 토끼팀 역방해\n`));
function passage(name,from,to,cond){add(ROOT+'통로/'+name+'.md',y('통로',name,`출발: "[[${from}]]"\n도착: "[[${to}]]"\n통로상태: 조건부\n조건: ${cond}\n`)+`# ${name}\n\n## 상태\n조건부. 조건을 만족하면 개방된다.\n\n## 기본 조건\n${cond}\n\n## 해결책 3개 이상\n1. 차량 판정으로 정면 돌파한다.\n2. 아이템 또는 제작 특성을 사용해 난이도를 낮춘다.\n3. 팀원 2명 이상이 협동하여 보정값을 얻는다.\n4. 토끼팀을 역방해해 같은 구간의 위험을 분산시킨다.\n\n## 실패 결과\n차량 내구도 -1 또는 토끼팀 진행도 +1.\n`)}
passage('통로_제작장_출발선','자동차_제작장','출발선','자동차 완성도 4/4 또는 임시완성 선언');
passage('통로_출발선_당근밭','출발선','당근밭_직선로','출발 신호 확인 또는 속도 판정 성공');
passage('통로_당근밭_흔들다리','당근밭_직선로','흔들다리','당근밭 방해물 제거 또는 회피');
passage('통로_흔들다리_진흙늪','흔들다리','진흙늪_코너','무게 균형 유지');
passage('통로_진흙늪_언덕','진흙늪_코너','언덕_가속로','바퀴 또는 외골격 보강');
passage('통로_언덕_해변','언덕_가속로','해변_모래길','엔진 과열 방지');
passage('통로_해변_결승선','해변_모래길','마지막_결승선','모래길 접지력 확보');
passage('통로_비밀지름길','진흙늪_코너','마지막_결승선','단서 2개 이상으로 위치 확인');
add(ROOT+'세부장소/자동차_제작_기록지.md',y('세부장소','자동차 제작 기록지')+`# 자동차 제작 기록지\n\n플레이어가 직접 칸을 채우는 제작 기록지다. 정답 재료는 없다.\n\n## 1단계 설계도 그리기\n담당자:\n사용 재료:\n설계 의도:\n강점:\n약점:\n판정 난이도:\n성공 결과:\n실패 결과:\n\n## 2단계 외골격 만들기\n담당자:\n사용 재료:\n장갑 방식:\n차량 형태:\n내구 보정:\n무게 증가:\n판정 난이도:\n성공 결과:\n실패 결과:\n\n## 3단계 엔진 만들기\n담당자:\n사용 재료:\n동력 방식:\n속도 보정:\n연료 소모:\n과열 위험:\n판정 난이도:\n성공 결과:\n실패 결과:\n\n## 4단계 완성하기\n담당자:\n최종 이름:\n탑승 인원 배치:\n거북이 좌석:\n플레이어 좌석:\n최종 특성 3개:\n최종 약점 2개:\n완성도:\n\n## 제작 보정 예시\n- 튼튼함: 내구도 +2, 속도 -1\n- 가벼움: 속도 +1, 내구도 -1\n- 안정성: 제어 +1\n- 과격한 엔진: 속도 +2, 과열 이벤트 확률 증가\n`);
add(ROOT+'세부장소/레이스_구간_진행규칙.md',y('세부장소','레이스 구간 진행규칙')+`# 레이스 구간 진행규칙\n\n## 구간 절차\n1. 현재 구간 설명\n2. 토끼팀 방해 다이스 1회\n3. 플레이어 대응 선언\n4. 차량 판정 또는 팀 판정\n5. 성공/부분성공/실패 결과 적용\n\n## 판정 기준\n- 속도: 빠른 돌파, 추월, 거리 벌리기\n- 제어: 회피, 코너링, 균형\n- 내구: 충돌, 방해물 돌파\n- 연료: 장거리 유지, 엔진 안정\n\n## 역방해\n플레이어는 토끼팀의 길을 막거나, 미끼를 놓거나, 방해물을 되돌려 보낼 수 있다. 실패하면 토끼팀 경보 +1.\n`);
add(ROOT+'세부장소/토끼팀_방해_다이스표.md',y('세부장소','토끼팀 방해 다이스표')+`# 토끼팀 방해 다이스표\n\n레이스 구간 시작마다 1d6을 굴린다. 토끼팀원 수는 토끼 + 현재 플레이어 수만큼으로 조정한다. 최대 플레이어 4명 기준 토끼팀은 5명이다.\n\n| 1d6 | 방해 | 효과 | 대응 예시 |\n|---|---|---|---|\n| 1 | 당근 못 뿌리기 | 제어 난이도 +1 | 바퀴 보강, 청소, 점프 |\n| 2 | 거짓 표지판 | 잘못된 통로 유도 | 단서 확인, 지도 판정, 토끼 역추적 |\n| 3 | 엔진 과열 유도 | 연료 -1 또는 속도 -1 | 냉각 아이템, 엔진 조절 |\n| 4 | 앞지르기 도발 | 토끼팀 진행도 +1 | 침착 유지, 역도발 |\n| 5 | 방해물 투척 | 내구도 -1 위험 | 회피, 방패, 반사 |\n| 6 | 합동 작전 | 위 효과 2개 선택 | 팀 전원 협동 또는 아이템 소모 |\n`);
function npc(n,role,place){add(ROOT+'NPC/'+n+'.md',y('NPC_일반',n,`현재장소: "[[${place}]]"\n생존상태: 생존\n전투시트: "[[${n}_전투시트]]"\n`)+`# ${n}\n\n역할: ${role}\n성격: 자기 방식이 뚜렷하고 승부욕이 있다.\n목표: 레이스에서 자기 팀의 승리를 돕는다.\n위치: [[${place}]]\n이동: 세계상태와 이벤트에 따라 다음 구간으로 이동한다.\n대화: 협상, 도발, 정보 거래 가능.\n세계 반응: 사망/납치/실종/소멸 시 기존 장소에서 등장하지 않는다.\n`);
add(ROOT+'NPC_전투시트/'+n+'_전투시트.md',`---\n종류: NPC\n시트지속성: NPC\n이름: ${n}\n일반시트: "[[${n}]]"\n레벨: 1\nHP: 10\nMP: 3\n힘: 2\n민첩: 3\n체력: 2\n지능: 2\n지혜: 2\n외모: 1\n방어: 1\n명중: 1\n회피: 1\n상태: 생존\n---\n\n# ${n} 전투시트\n\n기본행동: 밀치기, 방해물 설치, 차량 흔들기\n특수행동: 역할에 맞는 구간 방해 1회\n패배결과: 도주 또는 방해 중단\n`)}
npc('거북이','거북이팀 레이서','자동차_제작장');
npc('토끼','토끼팀 주장','출발선');
npc('토끼팀_정비사','엔진 방해 담당','당근밭_직선로');
npc('토끼팀_도약수','점프 방해 담당','흔들다리');
npc('토끼팀_표지판꾼','거짓 표지 담당','진흙늪_코너');
npc('토끼팀_모래주자','해변 방해 담당','해변_모래길');
function item(n,effect){add(ROOT+'아이템/'+n+'.md',y('아이템',n)+`# ${n}\n\n입수 조건: 해당 장소 조사, 거래, 제작, 또는 판정 성공.\n입수 난이도: 보통\n실패 결과: 시간 소모 또는 토끼팀 경보 +1\n해금 효과: ${effect}\n사용 후 결과: 세계상태 또는 차량 제작 기록지에 반영한다.\n`)}
item('아이템_낡은_스프링','속도 판정 1회 보정 또는 도약 장치 제작');

function crcTable(){let c,t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=(c&1)?(0xedb88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t}const CRC=crcTable();
function crc32(bytes){let c=0xffffffff;for(const b of bytes)c=CRC[(c^b)&255]^(c>>>8);return (c^0xffffffff)>>>0}
function u16(n){return [n&255,(n>>>8)&255]}function u32(n){return [n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255]}
function zipStore(files){const enc=new TextEncoder();let out=[],central=[],offset=0;for(const [name,text] of Object.entries(files)){const fn=enc.encode(name),data=enc.encode(text),crc=crc32(data);const local=[...u32(0x04034b50),...u16(20),...u16(2048),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(fn.length),...u16(0),...fn,...data];out.push(...local);central.push(...u32(0x02014b50),...u16(20),...u16(20),...u16(2048),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(fn.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset),...fn);offset+=local.length}const centralOffset=out.length;out.push(...central);out.push(...u32(0x06054b50),...u16(0),...u16(0),...u16(Object.keys(files).length),...u16(Object.keys(files).length),...u32(central.length),...u32(centralOffset),...u16(0));return new Uint8Array(out)}
document.getElementById('downloadBtn').onclick=()=>{const zip=zipStore(files);const blob=new Blob([zip],{type:'application/zip'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rabbit_turtle_newtrpg_scenario_github.zip';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);document.getElementById('log').textContent=`ZIP 생성 완료\n파일 수: ${Object.keys(files).length}\n크기: ${zip.length} bytes\n플러그인에 ZIP 가져오기로 넣으세요.`};
